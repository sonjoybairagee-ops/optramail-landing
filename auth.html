<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OptraMail — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070d;
      --surface: #0f0f1a;
      --border: #1c1c2e;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #eeeef8;
      --muted: #6b6b8a;
      --green: #22c55e;
      --red: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* BG ORBS */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(108,99,255,.1); top: -100px; right: -100px; }
    .orb-2 { width: 300px; height: 300px; background: rgba(255,101,132,.07); bottom: -80px; left: -80px; }

    .auth-box {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
      justify-content: center;
    }

    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 22px; font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* TABS */
    .tabs {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1; padding: 9px;
      text-align: center;
      font-size: 13px; font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-radius: 7px;
      transition: all .2s;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--accent), #8b7cf8);
      color: white;
    }

    /* FORM */
    .form { display: flex; flex-direction: column; gap: 16px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }

    .form-group label {
      font-size: 12px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
    }

    .form-group input {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }

    .form-group input:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: var(--muted); }

    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 44px; }
    .eye-btn {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 16px; padding: 2px;
    }
    .eye-btn:hover { color: var(--text); }

    .submit-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--accent), #8b7cf8);
      color: white; border: none;
      border-radius: 12px;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all .2s;
      box-shadow: 0 0 30px rgba(108,99,255,.25);
      margin-top: 4px;
    }

    .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 0 50px rgba(108,99,255,.4); }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* MESSAGES */
    .msg {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px; font-weight: 500;
      display: none;
    }

    .msg.error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: var(--red); }
    .msg.success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.2); color: var(--green); }
    .msg.show { display: block; }

    /* DIVIDER */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 4px 0;
      font-size: 12px; color: var(--muted);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    /* FOOTER */
    .auth-footer {
      text-align: center; margin-top: 20px;
      font-size: 12px; color: var(--muted);
    }

    .auth-footer a {
      color: var(--accent); text-decoration: none; font-weight: 500;
    }
    .auth-footer a:hover { text-decoration: underline; }

    /* LOADING */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block; margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* PASSWORD STRENGTH */
    .strength-bar {
      height: 3px; border-radius: 2px;
      background: var(--border);
      overflow: hidden; margin-top: 6px;
      display: none;
    }
    .strength-fill {
      height: 100%; border-radius: 2px;
      transition: width .3s, background .3s;
    }
    .strength-label { font-size: 11px; color: var(--muted); margin-top: 3px; display: none; }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="auth-box">
  <div class="logo">
    <div class="logo-icon">📬</div>
    <div class="logo-text">OptraMail</div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</div>
    <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <!-- MESSAGE -->
  <div class="msg" id="msg"></div>

  <!-- SIGN IN FORM -->
  <div id="form-signin" class="form">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrap">
        <input type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter') submitSignin()"/>
        <button class="eye-btn" onclick="togglePassword('signin-password', this)" tabindex="-1">👁</button>
      </div>
    </div>
    <button class="submit-btn" id="signin-btn" onclick="submitSignin()">Sign In</button>
    <div class="divider">or</div>
    <div style="text-align:center;font-size:13px;color:var(--muted);">
      Don't have an account? <a href="#" onclick="switchTab('signup');return false;" style="color:var(--accent);font-weight:500;">Sign Up</a>
    </div>
  </div>

  <!-- SIGN UP FORM -->
  <div id="form-signup" class="form" style="display:none;">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrap">
        <input type="password" id="signup-password" placeholder="Min. 6 characters"
          autocomplete="new-password"
          oninput="checkStrength(this.value)"
          onkeydown="if(event.key==='Enter') submitSignup()"/>
        <button class="eye-btn" onclick="togglePassword('signup-password', this)" tabindex="-1">👁</button>
      </div>
      <div class="strength-bar" id="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label"></div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <div class="password-wrap">
        <input type="password" id="signup-confirm" placeholder="Repeat password"
          autocomplete="new-password"
          onkeydown="if(event.key==='Enter') submitSignup()"/>
        <button class="eye-btn" onclick="togglePassword('signup-confirm', this)" tabindex="-1">👁</button>
      </div>
    </div>
    <button class="submit-btn" id="signup-btn" onclick="submitSignup()">Create Account</button>
    <div class="divider">or</div>
    <div style="text-align:center;font-size:13px;color:var(--muted);">
      Already have an account? <a href="#" onclick="switchTab('signin');return false;" style="color:var(--accent);font-weight:500;">Sign In</a>
    </div>
  </div>

  <div class="auth-footer">
    By continuing, you agree to our <a href="#">Terms</a> & <a href="#">Privacy Policy</a>
  </div>
</div>

<script>
  const API = "https://optramail-backend.vercel.app";

  // ── CHECK IF ALREADY LOGGED IN ──
  window.addEventListener('load', () => {
    const token = localStorage.getItem('optramail_token');
    const email = localStorage.getItem('optramail_email');
    if (token && email) {
      window.location.href = 'dashboard.html?email=' + encodeURIComponent(email);
    }
  });

  function switchTab(tab) {
    document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('form-signin').style.display = tab === 'signin' ? 'flex' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'flex' : 'none';
    hideMsg();
  }

  function showMsg(text, type = 'error') {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = `msg ${type} show`;
  }

  function hideMsg() {
    document.getElementById('msg').className = 'msg';
  }

  function togglePassword(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
      input.type = 'text'; btn.textContent = '🙈';
    } else {
      input.type = 'password'; btn.textContent = '👁';
    }
  }

  function checkStrength(val) {
    const bar = document.getElementById('strength-bar');
    const fill = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    bar.style.display = 'block';
    label.style.display = 'block';

    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { w: '20%', c: '#ef4444', t: 'Too weak' },
      { w: '40%', c: '#f97316', t: 'Weak' },
      { w: '60%', c: '#eab308', t: 'Fair' },
      { w: '80%', c: '#22c55e', t: 'Strong' },
      { w: '100%', c: '#6c63ff', t: 'Very strong' },
    ];
    const l = levels[Math.min(score, 4)];
    fill.style.width = l.w;
    fill.style.background = l.c;
    label.textContent = l.t;
    label.style.color = l.c;
  }

  // ── SIGN IN ──
  async function submitSignin() {
    const email    = document.getElementById('signin-email').value.trim();
    const password = document.getElementById('signin-password').value;
    const btn      = document.getElementById('signin-btn');

    if (!email || !password) { showMsg('Please fill in all fields.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    hideMsg();

    try {
      const res = await fetch(`${API}/api/auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'signin', email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showMsg(data.error || 'Sign in failed. Please try again.');
        return;
      }

      // Save to localStorage
      localStorage.setItem('optramail_token', data.token);
      localStorage.setItem('optramail_email', data.user.email);
      localStorage.setItem('optramail_plan', data.user.isPro ? 'pro' : 'free');

      showMsg('✅ Signed in! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = `dashboard.html?email=${encodeURIComponent(data.user.email)}&plan=${data.user.isPro ? 'pro' : 'free'}`;
      }, 800);

    } catch (err) {
      showMsg('Network error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  }

  // ── SIGN UP ──
  async function submitSignup() {
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const confirm  = document.getElementById('signup-confirm').value;
    const btn      = document.getElementById('signup-btn');

    if (!email || !password || !confirm) { showMsg('Please fill in all fields.'); return; }
    if (password !== confirm) { showMsg('Passwords do not match.'); return; }
    if (password.length < 6) { showMsg('Password must be at least 6 characters.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account...';
    hideMsg();

    try {
      const res = await fetch(`${API}/api/auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'signup', email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showMsg(data.error || 'Sign up failed. Please try again.');
        return;
      }

      localStorage.setItem('optramail_token', data.token);
      localStorage.setItem('optramail_email', data.user.email);
      localStorage.setItem('optramail_plan', 'free');

      showMsg('🎉 Account created! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = `dashboard.html?email=${encodeURIComponent(data.user.email)}&plan=free`;
      }, 800);

    } catch (err) {
      showMsg('Network error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
    }
  }
</script>
</body>
</html>
